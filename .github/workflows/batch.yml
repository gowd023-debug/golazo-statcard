name: 🏭 Render TODOS los Shorts (batch)

on:
  workflow_dispatch:
      inputs:
            filter:
                    description: 'Filtro opcional (ej: argentina, brasil, _en) — vacío = todos'
                            required: false
                                    default: ''

                                    jobs:
                                      discover:
                                          runs-on: ubuntu-latest
                                              outputs:
                                                    configs: ${{ steps.list.outputs.configs }}
                                                        steps:
                                                              - uses: actions/checkout@v4
                                                                    - id: list
                                                                            run: |
                                                                                      FILTER="${{ github.event.inputs.filter }}"
                                                                                                if [ -z "$FILTER" ]; then
                                                                                                            LIST=$(ls configs/*.json | xargs -n1 basename | jq -R -s -c 'split("\n")[:-1]')
                                                                                                                      else
                                                                                                                                  LIST=$(ls configs/*.json | xargs -n1 basename | grep "$FILTER" | jq -R -s -c 'split("\n")[:-1]')
                                                                                                                                            fi
                                                                                                                                                      echo "configs=$LIST" >> $GITHUB_OUTPUT
                                                                                                                                                                echo "🎯 Configs a renderizar: $LIST"
                                                                                                                                                                
                                                                                                                                                                  render:
                                                                                                                                                                      needs: discover
                                                                                                                                                                          runs-on: ubuntu-latest
                                                                                                                                                                              timeout-minutes: 25
                                                                                                                                                                                  strategy:
                                                                                                                                                                                        matrix:
                                                                                                                                                                                                config: ${{ fromJson(needs.discover.outputs.configs) }}
                                                                                                                                                                                                      max-parallel: 4
                                                                                                                                                                                                            fail-fast: false
                                                                                                                                                                                                                steps:
                                                                                                                                                                                                                      - uses: actions/checkout@v4
                                                                                                                                                                                                                            - uses: actions/setup-node@v4
                                                                                                                                                                                                                                    with: { node-version: '20' }
                                                                                                                                                                                                                                          - uses: actions/setup-python@v5
                                                                                                                                                                                                                                                  with: { python-version: '3.11' }
                                                                                                                                                                                                                                                        - name: FFmpeg
                                                                                                                                                                                                                                                                run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg xvfb
                                                                                                                                                                                                                                                                      - uses: browser-actions/setup-chrome@v1
                                                                                                                                                                                                                                                                              with: { chrome-version: stable }
                                                                                                                                                                                                                                                                                    - name: HyperFrames
                                                                                                                                                                                                                                                                                            run: npm install -g hyperframes@latest --ignore-scripts
                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                  - name: Generar + Renderizar
                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                    NAME="${{ matrix.config }}"
                                                                                                                                                                                                                                                                                                                              BASE="${NAME%.json}"
                                                                                                                                                                                                                                                                                                                                        echo "🎬 Produciendo: $BASE"
                                                                                                                                                                                                                                                                                                                                                  python3 make_short.py "configs/$NAME" index.html
                                                                                                                                                                                                                                                                                                                                                            mkdir -p output
                                                                                                                                                                                                                                                                                                                                                                      Xvfb :99 -screen 0 1920x1080x24 &
                                                                                                                                                                                                                                                                                                                                                                                sleep 2
                                                                                                                                                                                                                                                                                                                                                                                          DISPLAY=:99 hyperframes render . \
                                                                                                                                                                                                                                                                                                                                                                                                      --output "output/${BASE}.mp4" \
                                                                                                                                                                                                                                                                                                                                                                                                                  --fps 30
                                                                                                                                                                                                                                                                                                                                                                                                                          env:
                                                                                                                                                                                                                                                                                                                                                                                                                                    DISPLAY: ':99'
                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Música (si existe)
                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                            NAME="${{ matrix.config }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      BASE="${NAME%.json}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if [ -f assets/music.mp3 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ffmpeg -y -i "output/${BASE}.mp4" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          -stream_loop -1 -i assets/music.mp3 \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -filter_complex "[1:a]volume=0.5,atrim=0:38,afade=t=out:st=36:d=2[a]" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      -map 0:v -map "[a]" -shortest \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -c:v copy -c:a aac -b:a 192k \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  "output/${BASE}_music.mp4"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              mv "output/${BASE}_music.mp4" "output/${BASE}.mp4"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                name: short-${{ matrix.config }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          path: output/*.mp4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    retention-days: 7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      collect:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          needs: render
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - uses: actions/download-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              path: all_shorts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        merge-multiple: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Resumen
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "════════════════════════════════════"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo " 🏆 SHORTS PRODUCIDOS"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "════════════════════════════════════"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ls -lh all_shorts/ || echo "ninguno"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      name: TODOS-los-shorts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                path: all_shorts/*.mp4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          retention-days: 7
